    <rect x="28" y="84" width="6" height="6" rx="1" />
    <rect x="38" y="84" width="6" height="6" rx="1" />
    <rect x="58" y="40" width="6" height="6" rx="1" />
    <rect x="68" y="40" width="6" height="6" rx="1" />
    <rect x="58" y="52" width="6" height="6" rx="1" />
    <rect x="68" y="52" width="6" height="6" rx="1" />
    <rect x="58" y="64" width="6" height="6" rx="1" />
    <rect x="68" y="64" width="6" height="6" rx="1" />
    <rect x="58" y="76" width="6" height="6" rx="1" />
    <rect x="68" y="76" width="6" height="6" rx="1" />
